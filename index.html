<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetScanner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;800&display=swap');

        :root {
            --bg:      #080d14;
            --surface: rgba(15, 25, 40, 0.85);
            --border:  rgba(0, 255, 180, 0.12);
            --accent:  #00ffb4;
            --accent2: #0ea5e9;
            --muted:   #334155;
            --text:    #e2f4ff;
            --dim:     #4a6580;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding: 32px 24px;
            background-image:
                linear-gradient(rgba(0,255,180,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,180,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        header { text-align: center; margin-bottom: 40px; }
        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }

        .scan-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            padding: 10px 28px;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .scan-btn:hover:not(:disabled) {
            background: rgba(0,255,180,0.08);
            box-shadow: 0 0 20px rgba(0,255,180,0.2);
        }
        .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .status-bar { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: var(--dim); }
        .status-bar span { color: var(--accent); }

        .scanning-indicator {
            display: none;
            align-items: center;
            gap: 10px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent);
        }
        .scanning-indicator.active { display: flex; }
        .pulse-ring {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.3; transform: scale(0.7); }
        }

        .summary {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .summary-item { text-align: center; }
        .summary-item .num { font-size: 2rem; font-weight: 800; color: var(--accent); display: block; }
        .summary-item .label { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }

        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .device-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(12px);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            animation: fadeIn 0.4s ease both;
        }
        .device-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0,255,180,0.35);
            box-shadow: 0 8px 30px rgba(0,255,180,0.08);
        }
        .device-card.self-device { border-color: rgba(14,165,233,0.35); }
        .device-card.self-device:hover {
            border-color: rgba(14,165,233,0.6);
            box-shadow: 0 8px 30px rgba(14,165,233,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }
        .device-icon { font-size: 1.8rem; }
        .badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

        .self-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.62rem;
            background: rgba(14,165,233,0.15);
            color: var(--accent2);
            border: 1px solid rgba(14,165,233,0.3);
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 1px;
        }
        .type-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.62rem;
            background: rgba(0,255,180,0.08);
            color: var(--accent);
            border: 1px solid rgba(0,255,180,0.2);
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .device-ip {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .device-hostname {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.82rem;
            color: var(--accent2);
            margin-bottom: 6px;
            min-height: 1.1em;
        }
        .device-mac   { font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--dim); margin-bottom: 4px; }
        .device-vendor { font-size: 0.8rem; color: #64748b; }

        .open-ports {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .port-pill {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #64748b;
            padding: 1px 7px;
            border-radius: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--dim);
            font-family: 'Share Tech Mono', monospace;
            display: none;
        }
        .empty-state.visible { display: block; }
        .empty-state p { margin-top: 12px; font-size: 0.85rem; }

        /* ── Modal Overlay ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(4, 8, 16, 0.85);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: #0b1520;
            border: 1px solid rgba(0,255,180,0.2);
            border-radius: 20px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 60px rgba(0,255,180,0.08), 0 24px 80px rgba(0,0,0,0.6);
            animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 24px 16px;
            border-bottom: 1px solid rgba(0,255,180,0.08);
        }
        .modal-title-row { display: flex; align-items: center; gap: 14px; }
        .modal-icon { font-size: 2rem; }
        .modal-title { font-size: 1.3rem; font-weight: 800; color: var(--accent); font-family: 'Share Tech Mono', monospace; }
        .modal-subtitle { font-size: 0.78rem; color: var(--dim); margin-top: 2px; }
        .modal-close {
            background: none; border: none; color: var(--dim);
            font-size: 1.4rem; cursor: pointer; padding: 4px 8px;
            border-radius: 6px; transition: color 0.2s, background 0.2s;
            line-height: 1;
        }
        .modal-close:hover { color: var(--accent); background: rgba(0,255,180,0.07); }

        .modal-body { padding: 20px 24px 24px; }

        .modal-section { margin-bottom: 20px; }
        .modal-section-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .info-row {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 10px 12px;
        }
        .info-row.full { grid-column: span 2; }
        .info-label { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .info-value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.88rem;
            color: var(--text);
            word-break: break-all;
        }
        .info-value.accent { color: var(--accent); }
        .info-value.accent2 { color: var(--accent2); }

        .copy-btn {
            background: none; border: none;
            color: var(--dim); cursor: pointer;
            font-size: 0.75rem; padding: 2px 6px;
            border-radius: 4px; transition: color 0.2s;
            vertical-align: middle; margin-left: 4px;
        }
        .copy-btn:hover { color: var(--accent); }

        /* Latency bar */
        .latency-bar-wrap { margin-top: 6px; }
        .latency-bar-bg {
            height: 4px; background: rgba(255,255,255,0.06);
            border-radius: 4px; overflow: hidden;
        }
        .latency-bar-fill {
            height: 100%; border-radius: 4px;
            transition: width 0.6s ease;
        }
        .latency-label { font-size: 0.7rem; color: var(--dim); margin-top: 4px; }

        /* Port pills in modal */
        .modal-ports { display: flex; flex-wrap: wrap; gap: 6px; }
        .modal-port-pill {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.72rem;
            background: rgba(0,255,180,0.06);
            border: 1px solid rgba(0,255,180,0.18);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex; align-items: center; gap: 5px;
        }
        .modal-port-pill .port-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 4px var(--accent);
        }
        .no-ports { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: var(--dim); }

        /* Note textarea */
        .note-textarea {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.82rem;
            padding: 10px 12px;
            resize: vertical;
            min-height: 72px;
            outline: none;
            transition: border-color 0.2s;
        }
        .note-textarea:focus { border-color: rgba(0,255,180,0.35); }
        .note-save-btn {
            margin-top: 8px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            padding: 6px 18px;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .note-save-btn:hover { background: rgba(0,255,180,0.08); }
        .note-saved-msg { font-size: 0.72rem; color: var(--accent); margin-left: 10px; opacity: 0; transition: opacity 0.3s; }
        .note-saved-msg.show { opacity: 1; }

        /* Badges in modal */
        .modal-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    </style>
</head>
<body>

<header>
    <h1>NetScanner</h1>
</header>

<div class="controls">
    <button class="scan-btn" id="scanBtn" onclick="startScan()">⟳ Scan Network</button>
    <div class="scanning-indicator" id="scanningIndicator">
        <div class="pulse-ring"></div>
        <span id="scanningText">Scanning subnet...</span>
    </div>
    <div class="status-bar" id="statusBar">Ready</div>
</div>

<div class="summary" id="summary" style="display:none">
    <div class="summary-item">
        <span class="num" id="totalCount">0</span>
        <span class="label">Devices Found</span>
    </div>
    <div class="summary-item">
        <span class="num" id="lastScanTime">—</span>
        <span class="label">Last Scan</span>
    </div>
    <div class="summary-item">
        <span class="num" id="ownIp">—</span>
        <span class="label">Your IP</span>
    </div>
</div>

<div class="device-grid" id="deviceGrid"></div>
<div class="empty-state" id="emptyState">
    <div style="font-size:2rem">📡</div>
    <p>No devices found. Try scanning again.</p>
</div>

<!-- ── Device Detail Modal ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modalBox">
        <div class="modal-header">
            <div class="modal-title-row">
                <span class="modal-icon" id="mIcon">🔌</span>
                <div>
                    <div class="modal-title" id="mIp">—</div>
                    <div class="modal-subtitle" id="mSubtitle">—</div>
                </div>
            </div>
            <button class="modal-close" onclick="closeModalDirect()">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-badges" id="mBadges"></div>
            <div class="modal-section" style="margin-top:16px">
                <div class="modal-section-title">Identity</div>
                <div class="info-grid">
                    <div class="info-row">
                        <div class="info-label">IP Address</div>
                        <div class="info-value accent" id="mIpVal">—<button class="copy-btn" onclick="copyText('mIpVal')" title="Copy">⎘</button></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">Device Type</div>
                        <div class="info-value" id="mType">—</div>
                    </div>
                    <div class="info-row full">
                        <div class="info-label">Hostname</div>
                        <div class="info-value accent2" id="mHostname">—</div>
                    </div>
                    <div class="info-row full">
                        <div class="info-label">MAC Address</div>
                        <div class="info-value" id="mMac">—<button class="copy-btn" onclick="copyText('mMacVal')" title="Copy">⎘</button></div>
                    </div>
                    <div class="info-row full">
                        <div class="info-label">Vendor / Manufacturer</div>
                        <div class="info-value" id="mVendor">—</div>
                    </div>
                </div>
            </div>
            <div class="modal-section">
                <div class="modal-section-title">Network Latency</div>
                <div class="info-row">
                    <div class="info-value accent" id="mLatencyVal">Measuring...</div>
                    <div class="latency-bar-wrap">
                        <div class="latency-bar-bg">
                            <div class="latency-bar-fill" id="mLatencyBar" style="width:0%"></div>
                        </div>
                        <div class="latency-label" id="mLatencyLabel"></div>
                    </div>
                </div>
            </div>
            <div class="modal-section">
                <div class="modal-section-title">Detected Services / Open Ports</div>
                <div class="modal-ports" id="mPorts"></div>
            </div>
            <div class="modal-section">
                <div class="modal-section-title">Personal Note</div>
                <textarea class="note-textarea" id="mNoteInput" placeholder="e.g. Living room TV, Router..."></textarea>
                <div style="display:flex;align-items:center;margin-top:6px">
                    <button class="note-save-btn" onclick="saveNote()">Save Note</button>
                    <span class="note-saved-msg" id="noteSavedMsg">✓ Saved</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let polling = null;
    let currentModalIp = null;

    const PORT_LABELS = {
        'http': { label: 'HTTP :80', color: '#38bdf8' },
        'https': { label: 'HTTPS :443', color: '#34d399' },
        'ssh': { label: 'SSH :22', color: '#f59e0b' },
        'telnet': { label: 'Telnet :23', color: '#f87171' },
        'ios': { label: 'iOS :62078', color: '#a78bfa' },
        'airplay': { label: 'AirPlay :7000', color: '#fb923c' },
        'printer': { label: 'Printer', color: '#64748b' },
        'rdp': { label: 'RDP :3389', color: '#e879f9' },
        'vnc': { label: 'VNC :5900', color: '#f472b6' },
        'mqtt': { label: 'MQTT :1883', color: '#4ade80' },
        'coap': { label: 'CoAP :5683', color: '#22d3ee' },
    };

    const TYPE_ICONS = {
        'Router':          '🔀',
        'Printer':         '🖨️',
        'Smart TV':        '📺',
        'Apple TV':        '📺',
        'iPhone/iPad':     '📱',
        'Apple Device':    '🍎',
        'Mac':             '💻',
        'Android Phone':   '📱',
        'Gaming Console':  '🎮',
        'Virtual Machine': '🖥️',
        'PC/Laptop':       '💻',
        'Server':          '🗄️',
        'Raspberry Pi':    '🥧',
        'Amazon Device':   '🔵',
        'Google Device':   '🔴',
        'Smart Light':     '💡',
        'IoT Device':      '⚙️',
        'Unknown':         '🔌',
    };

    function getIcon(deviceType, vendor, isSelf) {
        if (isSelf) return '💻';
        if (deviceType && TYPE_ICONS[deviceType]) return TYPE_ICONS[deviceType];
        const v = (vendor || '').toLowerCase();
        if (v.includes('apple'))     return '🍎';
        if (v.includes('samsung'))   return '📱';
        if (v.includes('raspberry')) return '🥧';
        if (v.includes('cisco'))     return '🔀';
        if (v.includes('ubiquiti'))  return '📡';
        return '🔌';
    }

    function renderDevices(devices) {
        const grid  = document.getElementById('deviceGrid');
        const empty = document.getElementById('emptyState');
        grid.innerHTML = '';

        if (!devices.length) {
            empty.classList.add('visible');
            return;
        }
        empty.classList.remove('visible');

        devices.forEach((d, i) => {
            const card = document.createElement('div');
            card.className = 'device-card' + (d.self ? ' self-device' : '');
            card.style.animationDelay = `${i * 60}ms`;
            card.style.cursor = 'pointer';
            card.addEventListener('click', () => openModal(d));

            const portPills = (d.openHints || [])
                .map(h => `<span class="port-pill">${h}</span>`)
                .join('');

            card.innerHTML = `
                <div class="card-top">
                    <span class="device-icon">${getIcon(d.deviceType, d.vendor, d.self)}</span>
                    <div class="badges">
                        ${d.deviceType ? `<span class="type-badge">${d.deviceType}</span>` : ''}
                        ${d.self ? '<span class="self-badge">THIS DEVICE</span>' : ''}
                    </div>
                </div>
                <div class="device-ip">${d.ip}</div>
                <div class="device-hostname">${d.hostname ? d.hostname : '<span style="color:var(--muted);font-size:0.72rem">no hostname</span>'}</div>
                <div class="device-mac">${d.mac}</div>
                <div class="device-vendor">${d.vendor}</div>
                ${portPills ? `<div class="open-ports">${portPills}</div>` : ''}
            `;
            grid.appendChild(card);
        });
    }

    // ── Modal ──────────────────────────────────────────────
    function openModal(device) {
        currentModalIp = device.ip;

        document.getElementById('mIcon').textContent = getIcon(device.deviceType, device.vendor, device.self);
        document.getElementById('mIp').textContent   = device.ip;
        document.getElementById('mSubtitle').textContent = device.hostname || 'No hostname resolved';
        document.getElementById('mIpVal').childNodes[0].textContent = device.ip;
        document.getElementById('mType').textContent = device.deviceType || 'Unknown';
        document.getElementById('mHostname').textContent = device.hostname || '—';
        document.getElementById('mMac').childNodes[0].textContent = device.mac;
        document.getElementById('mVendor').textContent = device.vendor || 'Unknown';

        // Badges
        const badgesEl = document.getElementById('mBadges');
        badgesEl.innerHTML = '';
        if (device.self) badgesEl.innerHTML += '<span class="self-badge">THIS DEVICE</span>';
        if (device.deviceType) badgesEl.innerHTML += `<span class="type-badge">${device.deviceType}</span>`;

        // Ports
        const portsEl = document.getElementById('mPorts');
        if (device.openHints && device.openHints.length) {
            const seen = new Set();
            portsEl.innerHTML = device.openHints
                .filter(h => { if (seen.has(h)) return false; seen.add(h); return true; })
                .map(h => {
                    const p = PORT_LABELS[h] || { label: h, color: '#64748b' };
                    return `<span class="modal-port-pill"><span class="port-dot" style="background:${p.color};box-shadow:0 0 4px ${p.color}"></span>${p.label}</span>`;
                }).join('');
        } else {
            portsEl.innerHTML = '<span class="no-ports">No open services detected</span>';
        }

        // Note
        const notes = JSON.parse(localStorage.getItem('netscanner_notes') || '{}');
        document.getElementById('mNoteInput').value = notes[device.ip] || '';
        document.getElementById('noteSavedMsg').classList.remove('show');

        // Open overlay
        document.getElementById('modalOverlay').classList.add('open');

        // Measure latency
        measureLatency(device.ip);
    }

    function closeModal(e) {
        if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
    }
    function closeModalDirect() {
        document.getElementById('modalOverlay').classList.remove('open');
        currentModalIp = null;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

    async function measureLatency(ip) {
        const valEl   = document.getElementById('mLatencyVal');
        const barEl   = document.getElementById('mLatencyBar');
        const labelEl = document.getElementById('mLatencyLabel');
        valEl.textContent = 'Measuring...';
        barEl.style.width = '0%';
        barEl.style.background = 'var(--accent)';
        labelEl.textContent = '';

        try {
            const t0  = performance.now();
            await fetch(`http://localhost:3000/ping?ip=${ip}`, { signal: AbortSignal.timeout(3000) });
            const ms  = Math.round(performance.now() - t0);
            valEl.textContent = `${ms} ms`;

            // colour & bar: <10 green, <50 yellow, <150 orange, else red
            const pct = Math.min(100, (ms / 150) * 100);
            const color = ms < 10 ? '#34d399' : ms < 50 ? '#fbbf24' : ms < 150 ? '#fb923c' : '#f87171';
            barEl.style.width   = `${pct}%`;
            barEl.style.background = color;
            labelEl.textContent = ms < 10 ? 'Excellent' : ms < 50 ? 'Good' : ms < 150 ? 'Fair' : 'Poor';
            labelEl.style.color = color;
        } catch {
            valEl.textContent = 'Unreachable';
            labelEl.textContent = 'Device may be blocking ICMP';
        }
    }

    function copyText(elId) {
        const el = document.getElementById(elId);
        const text = el.childNodes[0].textContent.trim();
        navigator.clipboard.writeText(text).then(() => {
            const btn = el.querySelector('.copy-btn');
            if (btn) { btn.textContent = '✓'; setTimeout(() => btn.textContent = '⎘', 1200); }
        });
    }

    function saveNote() {
        if (!currentModalIp) return;
        const notes = JSON.parse(localStorage.getItem('netscanner_notes') || '{}');
        notes[currentModalIp] = document.getElementById('mNoteInput').value;
        localStorage.setItem('netscanner_notes', JSON.stringify(notes));
        const msg = document.getElementById('noteSavedMsg');
        msg.classList.add('show');
        setTimeout(() => msg.classList.remove('show'), 2000);
    }

    async function pollStatus() {
        try {
            const res  = await fetch('http://localhost:3000/status');
            const data = await res.json();

            if (data.status === 'scanning') {
                document.getElementById('scanningText').innerText = 'Scanning + enriching… (~30s)';
                return;
            }

            clearInterval(polling);
            polling = null;

            document.getElementById('scanBtn').disabled = false;
            document.getElementById('scanningIndicator').classList.remove('active');
            document.getElementById('statusBar').innerHTML = `Last scan: <span>${data.lastScan}</span>`;

            const summary = document.getElementById('summary');
            summary.style.display = 'flex';
            document.getElementById('totalCount').innerText  = data.devices.length;
            document.getElementById('lastScanTime').innerText = data.lastScan || '—';
            document.getElementById('ownIp').innerText        = data.ownIp   || '—';

            renderDevices(data.devices);
        } catch {
            document.getElementById('statusBar').innerText = 'Connection lost';
        }
    }

    async function startScan() {
        document.getElementById('scanBtn').disabled = true;
        document.getElementById('scanningIndicator').classList.add('active');
        document.getElementById('scanningText').innerText = 'Starting scan...';
        document.getElementById('statusBar').innerText = '';
        document.getElementById('deviceGrid').innerHTML = '';
        document.getElementById('summary').style.display = 'none';

        try {
            await fetch('http://localhost:3000/scan');
        } catch {
            document.getElementById('statusBar').innerText = 'Could not reach server';
            document.getElementById('scanBtn').disabled = false;
            return;
        }

        if (polling) clearInterval(polling);
        polling = setInterval(pollStatus, 2000);
    }
</script>
</body>
</html>
